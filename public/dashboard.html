<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .task {
      margin-bottom: 15px;
    }

    input {
      padding: 8px;
      margin-right: 5px;
      width: 80px;
    }

    button {
      padding: 10px 20px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #1e7e34;
    }
  </style>
</head>
<body>

<h2>Daily Task</h2>

<div class="card">
  <div id="tasks"></div>
</div>
<div class="card">
  <h3>How was your day?</h3>
  <textarea id="dayNote" rows="4" style="width:100%; padding:10px;" placeholder="Write about your day..."></textarea>
</div>
<button onclick="submitTask()">Submit</button>

<script>
const user = JSON.parse(localStorage.getItem("user"));

async function loadTasks() {
  const res = await fetch(`/tasks/${user.id}`);
  const data = await res.json();

  const tasks = Array.isArray(data) ? data : [];

  const container = document.getElementById("tasks");
  container.innerHTML = "";

  if (tasks.length === 0) {
    container.innerHTML = "<p>No tasks assigned</p>";
    return;
  }

  tasks.forEach(task => {
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <p><b>${task}</b></p>
      <input type="number" placeholder="Hrs" class="hrs">
      <input type="number" placeholder="Min" class="mins">
    `;

    container.appendChild(div);
  });
}
async function submitTask() {
  const rows = document.querySelectorAll(".task");

  let tasks = [];

  rows.forEach(row => {
    const task = row.querySelector("p").innerText;
    const hrs = parseInt(row.querySelector(".hrs").value) || 0;
    const mins = parseInt(row.querySelector(".mins").value) || 0;

    if (hrs || mins) {
      tasks.push({ task, hrs, mins });
    }
  });

  const note = document.getElementById("dayNote").value;

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "submit",
      user: user.id,
      tasks,
      note
    })
  });

  alert("Saved!");
}

loadTasks();
</script>

</body>
</html>
