
<!DOCTYPE html>
<html>
<head>
  <title>Employee Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    /* ================= RESET ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#f3f6fb;
  overflow-x:hidden;
}

/* ================= SIDEBAR ================= */

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:190px;
  height:100vh;
  background:linear-gradient(180deg,#0f172a,#111827);
  color:white;
  padding:28px 18px;
  z-index:100;
}

.logo{
  font-size:28px;
  font-weight:700;
  margin-bottom:40px;
}

.menu-item{
  padding:12px 14px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  color:#cbd5e1;
  transition:0.3s;
  font-size:15px;
}

.menu-item:hover{
  background:rgba(255,255,255,0.08);
  color:white;
  transform:translateX(4px);
}

/* ================= MAIN ================= */

.main{
  margin-left:190px;
  padding:24px;
  width:calc(100% - 190px);
  overflow-x:hidden;
}

/* ================= TOPBAR ================= */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.topbar h1{
  font-size:34px;
  font-weight:700;
}

.profile{
  background:white;
  padding:12px 18px;
  border-radius:14px;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
  font-weight:600;
}

/* ================= STATS ================= */

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-bottom:20px;
}

.stat-card{
  background:linear-gradient(135deg,#2563eb,#4f46e5);
  color:white;
  padding:20px;
  border-radius:18px;
  min-height:120px;
  box-shadow:0 8px 20px rgba(37,99,235,0.15);
}

.stat-card p{
  font-size:15px;
  opacity:0.9;
}

.stat-card h2{
  margin-top:12px;
  font-size:40px;
}

/* ================= DASHBOARD LAYOUT ================= */

.dashboard-layout{
  display:flex;
  gap:20px;
  align-items:flex-start;
  width:100%;
}

/* ================= TASK SECTION ================= */

.tasks-section{
  flex:1;
  min-width:0;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 4px 18px rgba(0,0,0,0.05);
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  margin-bottom:18px;
}

.section-header h2{
  font-size:22px;
  margin-bottom:6px;
}

.section-header p{
  color:#64748b;
  font-size:14px;
}

#workDate{
  padding:12px 16px;
  border-radius:12px;
  border:1px solid #dbe2ea;
  font-size:14px;
  outline:none;
  min-width:180px;
}

/* ================= TASK GRID ================= */

.tasks-grid{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
}

.task-card{
  width:calc(50% - 7px);
  min-width:280px;
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:14px;
}

.task-inner{
  background:#f8fafc;
  border-radius:14px;
  padding:16px;
  border:1px solid #eef2f7;
}

.task-name{
  font-size:20px;
  margin-bottom:8px;
  color:#111827;
}

.task-info{
  color:#64748b;
  margin-bottom:16px;
  font-size:14px;
}
.status-working{
  background:#dcfce7;
  color:#166534;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

.status-hold{
  background:#fef3c7;
  color:#92400e;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}
.task-inputs{
  display:flex;
  gap:10px;
}

.task-inputs input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid #d1d5db;
  outline:none;
  font-size:14px;
}

/* ================= SIDE PANEL ================= */

.side-panel{
  width:300px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.panel-card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 4px 18px rgba(0,0,0,0.05);
}

.panel-card h3{
  font-size:18px;
  margin-bottom:14px;
}

/* ================= TEXTAREA ================= */

textarea{
  width:100%;
  height:100px;
  padding:14px;
  border-radius:14px;
  border:1px solid #d1d5db;
  resize:none;
  outline:none;
  font-size:14px;
}

/* ================= SUMMARY ================= */

.summary-item{
  display:flex;
  justify-content:space-between;
  margin-top:14px;
  font-size:15px;
  color:#374151;
}

/* ================= BUTTON ================= */

.submit-btn{
  padding:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#4f46e5);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.submit-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(37,99,235,0.2);
}

/* ================= RESPONSIVE ================= */

@media(max-width:1200px){

  .dashboard-layout{
    flex-direction:column;
  }

  .side-panel{
    width:100%;
  }

}

@media(max-width:900px){

  .sidebar{
    width:100%;
    height:auto;
    position:relative;
  }

  .main{
    margin-left:0;
    width:100%;
  }

  .stats{
    grid-template-columns:1fr;
  }

  .task-card{
    width:100%;
    min-width:100%;
  }

  .tasks-grid{
    flex-direction:column;
  }

  .section-header{
    flex-direction:column;
    align-items:flex-start;
  }

}

  </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

  <div class="logo">TaskFlow</div>

  <div class="menu-item">Dashboard</div>
  <div class="menu-item">Tasks</div>
  <div class="menu-item">Summary</div>
  <div class="menu-item" onclick="window.location.href='profile.html'">
    Profile
  </div>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

  <div class="topbar">

    <h1>Welcome 👋</h1>

    <div class="profile" id="profileName">
      Employee
    </div>

  </div>

  <!-- ================= STATS ================= -->

  <div class="stats">

    <div class="stat-card">
      <p>Assigned Tasks</p>
      <h2 id="taskCount">0</h2>
    </div>

    <div class="stat-card">
      <p>Total Hours</p>
      <h2 id="totalHours">0</h2>
    </div>

    <div class="stat-card">
      <p>Status</p>
      <h2>Active</h2>
    </div>

  </div>

  <!-- ================= DASHBOARD ================= -->

  <div class="dashboard-layout">

    <!-- LEFT -->

    <div class="tasks-section">

      <div class="section-header">

        <div>
          <h2>Today's Tasks</h2>
          <p>Your assigned work for today</p>
        </div>

        <input type="date" id="workDate">

      </div>

      <div id="tasks" class="tasks-grid"></div>

    </div>

    <!-- RIGHT -->

    <div class="side-panel">

      <div class="panel-card">

        <h3>How was your day?</h3>

        <textarea
          id="dayNote"
          placeholder="Write your update..."
        ></textarea>

      </div>

      <div class="panel-card">

        <h3>Today's Summary</h3>

        <div class="summary-item">
          <span>Total Tasks</span>
          <b id="taskTotal">0</b>
        </div>

        <div class="summary-item">
          <span>Status</span>
          <b>Active</b>
        </div>

      </div>

      <button class="submit-btn" onclick="submitWork()">
        Submit Work
      </button>

    </div>

  </div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(user){
  document.getElementById("profileName").innerText = user.id;
}

// SET TODAY DATE

document.getElementById("workDate").value =
  new Date().toISOString().split("T")[0];

// LOAD TASKS

async function loadTasks() {

  const user = JSON.parse(localStorage.getItem("user"));

  const res = await fetch(`/tasks/${user.id}`);

  const tasks = await res.json();

  console.log(tasks);

  document.getElementById("taskCount").innerText = tasks.length;
  document.getElementById("taskTotal").innerText = tasks.length;

  const container = document.getElementById("tasks");

  container.innerHTML = "";

  if (!tasks.length) {

    container.innerHTML = `
      <p>No tasks assigned</p>
    `;

    return;
  }

  tasks.forEach(task => {

    const div = document.createElement("div");

    div.className = "task-card";

    div.innerHTML = `

<div class="task-inner">

  <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  ">

    <h3 class="task-name">
      ${task.task}
    </h3>

    <span class="
      ${task.status === 'On Hold'
        ? 'status-hold'
        : 'status-working'}
    ">
      ${task.status}
    </span>

  </div>

  <p class="task-info">
    ${task.client} • ${task.project}
  </p>

  <div class="task-inputs">

    <input
      type="number"
      placeholder="Hours"
      class="hrs"
    >

    <input
      type="number"
      placeholder="Minutes"
      class="mins"
    >

  </div>

</div>
`;

    container.appendChild(div);

  });

}

// SUBMIT WORK

async function submitWork() {

  const user = JSON.parse(localStorage.getItem("user"));

  const cards = document.querySelectorAll(".task-card");

  let tasks = [];

  let totalMinutes = 0;

  cards.forEach(card => {

    const taskName = card.querySelector(".task-name")?.innerText || "";

    const hrs = Number(card.querySelector(".hrs")?.value || 0);

    const mins = Number(card.querySelector(".mins")?.value || 0);

    totalMinutes += (hrs * 60) + mins;

    if (taskName) {

      tasks.push({
        task: taskName,
        hrs: hrs,
        mins: mins
      });

    }

  });

  const note = document.getElementById("dayNote").value;

  await fetch('/submit', {

    method: 'POST',

    headers: {
      'Content-Type': 'application/json'
    },

    body: JSON.stringify({

      action: "submit",

      user: user.id,

      tasks: tasks,

      note: note,

      workDate: document.getElementById("workDate").value

    })

  });

  document.getElementById("totalHours").innerText =
    (totalMinutes / 60).toFixed(1);

  alert("Submitted Successfully");

}

loadTasks();

</script>

</body>
</html>
