<!DOCTYPE html>
<html>
<head>
  <title>Task Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
    }

    /* 🔹 SIDEBAR */
    .sidebar {
      width: 220px;
      background: #111827;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .sidebar p {
      margin: 10px 0;
      cursor: pointer;
      color: #9ca3af;
    }

    .sidebar p:hover {
      color: white;
    }

    /* 🔹 MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .task {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }

    .task:last-child {
      border-bottom: none;
    }

    input {
      padding: 8px;
      margin-right: 5px;
      width: 70px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1e40af;
    }

    .summary {
      display: flex;
      gap: 20px;
    }

    .summary-box {
      flex: 1;
      background: #eef2ff;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- 🔹 SIDEBAR -->
<div class="sidebar">
  <h2>Task Manager</h2>
  <p>Dashboard</p>
  <p>My Tasks</p>
  <p>Reports</p>
</div>

<!-- 🔹 MAIN -->
<div class="main">

  <div class="header">
    <h2>Welcome 👋</h2>
  </div>

  <!-- 🔹 TASK LIST -->
  <div class="card">
    <h3>Today's Tasks</h3>
    <div id="tasks"></div>
  </div>

  <!-- 🔹 DAY NOTE -->
  <div class="card">
    <h3>How was your day?</h3>
    <textarea id="dayNote" rows="4" placeholder="Write about your day..."></textarea>
  </div>

  <!-- 🔹 SUBMIT -->
  <button onclick="submitTask()">Submit Work</button>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

// 🔹 LOAD TASKS
async function loadTasks() {
  const res = await fetch(`/tasks/${user.id}`);
  const data = await res.json();

  const container = document.getElementById("tasks");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No tasks assigned</p>";
    return;
  }

  data.forEach(task => {
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <p><b>${task}</b></p>
      <input type="number" placeholder="Hrs" class="hrs">
      <input type="number" placeholder="Min" class="mins">
    `;

    container.appendChild(div);
  });
}

// 🔹 SUBMIT
async function submitTask() {
  const rows = document.querySelectorAll(".task");

  let tasks = [];

  rows.forEach(row => {
    const task = row.querySelector("p").innerText;
    const hrs = parseInt(row.querySelector(".hrs").value) || 0;
    const mins = parseInt(row.querySelector(".mins").value) || 0;

    if (hrs || mins) {
      tasks.push({ task, hrs, mins });
    }
  });

  const note = document.getElementById("dayNote").value;

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "submit",
      user: user.id,
      tasks,
      note
    })
  });

  alert("Work Submitted ✅");
}

loadTasks();
</script>

</body>
</html>
