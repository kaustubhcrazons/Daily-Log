<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<!-- 🔹 ASSIGN TASK -->
<h3>Assign Task</h3>
<input id="username" placeholder="User ID (emp1)">
<input id="taskname" placeholder="Task">
<button onclick="assign()">Assign</button>

<br><br>

<!-- 🔹 REMOVE TASK -->
<h3>Remove Task</h3>
<input id="username2" placeholder="User ID (emp1)">
<input id="taskname2" placeholder="Task">
<button onclick="removeTask()">Remove</button>

<hr>

<!-- 🔹 ASSIGNED TASKS -->
<h3>Assigned Tasks</h3>
<div id="assigned"></div>

<script>

// 👉 YOUR APPS SCRIPT URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTesDLv0ejgSohfMUY1Pc2Gw0TzsZme-bq85cbT8KFiKIz-m-NuE5zEqNuP4djQ8ISjA/exec";

// 🔹 LOAD ASSIGNED TASKS
async function loadAssigned() {
  const res = await fetch(`/tasks/emp1`); // TEMP (uses Node proxy)

  const data = await res.json();

  const container = document.getElementById("assigned");
  container.innerHTML = "";

  container.innerHTML = `<p>${data.join(", ")}</p>`;
}

// 🔹 ASSIGN TASK
async function assign() {
  const name = document.getElementById("username").value;
  const task = document.getElementById("taskname").value;

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "assign",
      user: name,
      task: task
    })
  });

  alert("Task Assigned");
}

// 🔹 REMOVE TASK
async function removeTask() {
  const name = document.getElementById("username2").value;
  const task = document.getElementById("taskname2").value;

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "remove",
      user: name,
      task: task
    })
  });

  alert("Task Removed");
}

loadAssigned();

</script>

</body>
</html>
