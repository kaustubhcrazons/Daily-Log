<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<!-- 🔹 ASSIGN TASK -->
<h3>Assign Task</h3>
<input id="username" placeholder="User Name">
<input id="taskname" placeholder="Task">
<button onclick="assign()">Assign</button>

<br><br>

<!-- 🔹 REMOVE TASK -->
<h3>Remove Task</h3>
<input id="username2" placeholder="User Name">
<input id="taskname2" placeholder="Task">
<button onclick="removeTask()">Remove</button>

<hr>

<!-- 🔹 ASSIGNED TASKS VIEW -->
<h3>Assigned Tasks</h3>
<div id="assigned"></div>

<hr>

<!-- 🔹 EXISTING DATA -->
<h3>Work Data</h3>
<div id="data"></div>

<script>

// 🔹 LOAD WORK DATA (EXCEL)
async function loadData() {
  const res = await fetch('/admin-data');
  const data = await res.json();

  const container = document.getElementById("data");
  container.innerHTML = "";

  for (let user in data) {
    const userDiv = document.createElement("div");

    userDiv.innerHTML = `<h3>${user}</h3>`;

    let table = "<table border='1'><tr><th>Date</th><th>Task</th><th>Hours</th><th>Minutes</th><th>Timestamp</th></tr>";

    data[user].forEach(row => {
      table += `<tr>
        <td>${row.Date || ''}</td>
        <td>${row.Task || ''}</td>
        <td>${row.Hours || ''}</td>
        <td>${row.Minutes || ''}</td>
        <td>${row.Timestamp || ''}</td>
      </tr>`;
    });

    table += "</table>";

    userDiv.innerHTML += table;
    container.appendChild(userDiv);
  }
}

// 🔹 LOAD ASSIGNED TASKS
async function loadAssigned() {
  const res = await fetch('/assigned-tasks');
  const data = await res.json();

  const container = document.getElementById("assigned");
  container.innerHTML = "";

  for (let user in data) {
    const div = document.createElement("div");

    div.innerHTML = `<h4>${user}</h4><p>${data[user].join(", ")}</p>`;

    container.appendChild(div);
  }
}

// 🔹 ASSIGN TASK
async function assign() {
  const name = document.getElementById("username").value;
  const task = document.getElementById("taskname").value;

  await fetch('/assign-task', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, task })
  });

  alert("Task Assigned");
  loadAssigned();
}

// 🔹 REMOVE TASK
async function removeTask() {
  const name = document.getElementById("username2").value;
  const task = document.getElementById("taskname2").value;

  await fetch('/remove-task', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, task })
  });

  alert("Task Removed");
  loadAssigned();
}

// LOAD EVERYTHING
loadData();
loadAssigned();

</script>

</body>
</html>
