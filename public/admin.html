<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<h3>Assign Task</h3>
<input id="username" placeholder="emp1">
<input id="taskname" placeholder="Task">
<button onclick="assign()">Assign</button>

<br><br>

<h3>Remove Task</h3>
<input id="username2" placeholder="emp1">
<input id="taskname2" placeholder="Task">
<button onclick="removeTask()">Remove</button>

<hr>

<h3>Assigned Tasks</h3>
<div id="assigned"></div>

<script>

// LOAD TASKS
async function loadAssigned() {
  const name = document.getElementById("username").value || "emp1";

  const res = await fetch(`/tasks/${name}`);
  const data = await res.json();

  const container = document.getElementById("assigned");

  if (Array.isArray(data)) {
    container.innerHTML = `<p>${data.join(", ")}</p>`;
  } else {
    container.innerHTML = `<p>No tasks</p>`;
  }
}

// ASSIGN
async function assign() {
  const name = document.getElementById("username").value;
  const task = document.getElementById("taskname").value;

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "assign",
      user: name,
      task: task
    })
  });

  alert("Task Assigned");
  loadAssigned();
}

// REMOVE
async function removeTask() {
  const name = document.getElementById("username2").value;
  const task = document.getElementById("taskname2").value;

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "remove",
      user: name,
      task: task
    })
  });

  alert("Task Removed");
  loadAssigned();
}

loadAssigned();

</script>

</body>
</html>
