<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    select, input {
      padding: 8px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 8px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<h2>Admin Dashboard</h2>

<!-- 🔹 SELECT USER -->
<div class="card">
  <h3>Select Employee</h3>

  <select id="user" onchange="loadAssigned()">
    <option value="emp1">emp1</option>
    <option value="emp2">emp2</option>
  </select>
</div>

<!-- 🔹 ASSIGN -->
<div class="card">
  <h3>Assign Task</h3>

  <input id="task" placeholder="Task name">
  <button onclick="assign()">Assign</button>
</div>

<!-- 🔹 REMOVE -->
<div class="card">
  <h3>Remove Task</h3>

  <input id="task2" placeholder="Task name">
  <button onclick="removeTask()">Remove</button>
</div>

<!-- 🔹 TASK LIST -->
<div class="card">
  <h3>Assigned Tasks</h3>
  <div id="assigned"></div>
</div>
<div class="card">
  <h3>Task-wise Summary (This Month)</h3>
  <div id="taskSummary"></div>
</div>

<script>

// 🔹 LOAD TASKS BASED ON DROPDOWN
async function loadTaskSummary() {
  const user = document.getElementById("user").value;

  const res = await fetch(`/task-summary/${user}`);
  const data = await res.json();

  const container = document.getElementById("taskSummary");

  if (Object.keys(data).length === 0) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  let html = "";

  for (let task in data) {
    html += `
      <p>
        <b>${task}</b> → ${data[task].hrs} hrs ${data[task].mins} mins
      </p>
    `;
  }

  container.innerHTML = html;
}

// 🔹 ASSIGN TASK
async function assign() {
  const user = document.getElementById("user").value;
  const task = document.getElementById("task").value;

  if (!task) return alert("Enter task");

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "assign",
      user,
      task
    })
  });

  alert("Task Assigned");
  document.getElementById("task").value = "";
  loadAssigned();
}

// 🔹 REMOVE TASK
async function removeTask() {
  const user = document.getElementById("user").value;
  const task = document.getElementById("task2").value;

  if (!task) return alert("Enter task");

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "remove",
      user,
      task
    })
  });

  alert("Task Removed");
  document.getElementById("task2").value = "";
  loadAssigned();
}

// INITIAL LOAD
loadAssigned();

</script>

</body>
</html>
