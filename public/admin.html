<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#f3f6fb;
      display:flex;
      color:#111827;
    }

    /* ================= SIDEBAR ================= */

    .sidebar{
      width:260px;
      height:100vh;
      background:linear-gradient(180deg,#0f172a,#111827);
      color:white;
      padding:30px 20px;
      position:fixed;
      left:0;
      top:0;
    }

    .logo{
      font-size:24px;
      font-weight:700;
      margin-bottom:40px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .menu-item{
      padding:14px 16px;
      border-radius:12px;
      cursor:pointer;
      transition:0.3s;
      color:#cbd5e1;
    }

    .menu-item:hover{
      background:rgba(255,255,255,0.08);
      color:white;
      transform:translateX(4px);
    }

    /* ================= MAIN ================= */

    .main{
      margin-left:260px;
      width:100%;
      padding:35px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .topbar h1{
      font-size:32px;
      font-weight:700;
    }

    .profile{
      background:white;
      padding:12px 18px;
      border-radius:14px;
      box-shadow:0 4px 20px rgba(0,0,0,0.06);
    }

    /* ================= STATS ================= */

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-bottom:25px;
    }

    .stat-card{
      background:linear-gradient(135deg,#2563eb,#4f46e5);
      color:white;
      padding:24px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(37,99,235,0.2);
    }

    .stat-card h2{
      font-size:34px;
      margin-top:10px;
    }

    .stat-card p{
      opacity:0.9;
    }

    /* ================= GRID ================= */

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
    }

    /* ================= CARDS ================= */

    .card{
      background:rgba(255,255,255,0.8);
      backdrop-filter:blur(12px);
      border-radius:24px;
      padding:24px;
      box-shadow:0 8px 30px rgba(0,0,0,0.05);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card h3{
      margin-bottom:20px;
      font-size:22px;
    }

    /* ================= INPUTS ================= */

    select,
    input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #dbe2ea;
      margin-bottom:14px;
      font-size:15px;
      outline:none;
      transition:0.3s;
    }

    input:focus,
    select:focus{
      border-color:#2563eb;
      box-shadow:0 0 0 4px rgba(37,99,235,0.1);
    }

    /* ================= BUTTONS ================= */

    button{
      background:linear-gradient(135deg,#2563eb,#4f46e5);
      border:none;
      color:white;
      padding:14px 18px;
      border-radius:12px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      width:100%;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(37,99,235,0.25);
    }

    /* ================= TASKS ================= */

    .task{
      padding:14px;
      border-radius:12px;
      background:#f8fafc;
      margin-bottom:12px;
      border:1px solid #e5e7eb;
    }

    .task:hover{
      background:#eef2ff;
    }

    /* ================= SUMMARY ================= */

    .summary-item{
      padding:14px;
      border-radius:12px;
      background:#eff6ff;
      margin-bottom:12px;
    }

    .summary-item strong{
      display:block;
      margin-bottom:4px;
    }

    /* ================= MOBILE ================= */

    @media(max-width:900px){

      .stats{
        grid-template-columns:1fr;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .sidebar{
        width:80px;
      }

      .logo{
        font-size:18px;
      }

      .menu-item{
        font-size:12px;
        padding:10px;
      }

      .main{
        margin-left:80px;
      }
    }

  </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

  <div class="logo">TaskFlow</div>

  <div class="menu">
    <div class="menu-item">Dashboard</div>
    <div class="menu-item" onclick="showEmployees()">Employees</div>
    <div class="menu-item">Reports</div>
    <div class="menu-item">Settings</div>
  </div>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

  <div class="topbar">
    <h1>Admin Dashboard</h1>

    <div class="profile">
      Admin
    </div>
  </div>

  <!-- ================= STATS ================= -->

  <div class="stats">

    <div class="stat-card">
      <p>Total Employees</p>
      <h2>2</h2>
    </div>

    <div class="stat-card">
      <p>Assigned Tasks</p>
      <h2 id="taskCount">0</h2>
    </div>

    <div class="stat-card">
      <p>Total Hours</p>
      <h2>128</h2>
    </div>

  </div>

  <!-- ================= EMPLOYEE SECTION ================= -->

  <div class="card" id="employeeSection" style="display:none; margin-bottom:25px;">
    <h3>Employees</h3>

    <div id="employeeList"></div>
  </div>

  <!-- ================= GRID ================= -->

  <div class="grid">

    <!-- LEFT -->

    <div>

      <div class="card">
        <h3>Select Employee</h3>

        <select id="user" onchange="loadAssigned()">
          <option value="emp1">emp1</option>
          <option value="emp2">emp2</option>
        </select>
      </div>

      <div class="card" style="margin-top:20px;">
        <h3>Assign Task</h3>

        <input id="task" placeholder="Enter task">

        <button onclick="assign()">
          Assign Task
        </button>
      </div>

      <div class="card" style="margin-top:20px;">
        <h3>Remove Task</h3>

        <input id="task2" placeholder="Enter task">

        <button onclick="removeTask()">
          Remove Task
        </button>
      </div>

    </div>

    <!-- RIGHT -->

    <div>

      <div class="card">
        <h3>Assigned Tasks</h3>

        <div id="assigned"></div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h3>Monthly Summary</h3>

        <div id="taskSummary"></div>
      </div>

    </div>

  </div>

</div>

<script>

async function loadAssigned(){

  const user = document.getElementById("user").value;

  const res = await fetch(`/tasks/${user}`);
  const data = await res.json();

  const container = document.getElementById("assigned");

  if(!data.length){
    container.innerHTML = "<p>No tasks assigned</p>";
    return;
  }

  document.getElementById("taskCount").innerText = data.length;

  container.innerHTML = data.map(task => `
    <div class="task">
      • ${task}
    </div>
  `).join("");

  loadTaskSummary();
}

async function loadTaskSummary(){

  const user = document.getElementById("user").value;

  const res = await fetch(`/task-summary/${user}`);
  const data = await res.json();

  const container = document.getElementById("taskSummary");

  if(Object.keys(data).length === 0){
    container.innerHTML = "<p>No data available</p>";
    return;
  }

  let html = "";

  for(let task in data){

    html += `
      <div class="summary-item">
        <strong>${task}</strong>
        ${data[task].hrs} hrs ${data[task].mins} mins
      </div>
    `;
  }

  container.innerHTML = html;
}

async function assign(){

  const user = document.getElementById("user").value;
  const task = document.getElementById("task").value;

  if(!task) return alert("Enter task");

  await fetch('/submit',{
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      action:"assign",
      user,
      task
    })
  });

  document.getElementById("task").value = "";

  loadAssigned();
}

async function removeTask(){

  const user = document.getElementById("user").value;
  const task = document.getElementById("task2").value;

  if(!task) return alert("Enter task");

  await fetch('/submit',{
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      action:"remove",
      user,
      task
    })
  });

  document.getElementById("task2").value = "";

  loadAssigned();
}

function showEmployees(){

  const section = document.getElementById("employeeSection");

  section.style.display = "block";

  const employees = ["emp1","emp2"];

  const list = document.getElementById("employeeList");

  list.innerHTML = employees.map(emp => `
    <div class="task" onclick="selectEmployee('${emp}')" style="cursor:pointer;">
      ${emp}
    </div>
  `).join("");
}

function selectEmployee(emp){

  document.getElementById("user").value = emp;

  loadAssigned();
}

window.onload = () => {
  loadAssigned();
}

</script>

</body>
</html>
