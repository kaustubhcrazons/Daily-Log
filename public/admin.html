<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
    }

    /* 🔹 SIDEBAR */
    .sidebar {
      width: 220px;
      background: #111827;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .sidebar p {
      margin: 10px 0;
      cursor: pointer;
      color: #9ca3af;
    }

    .sidebar p:hover {
      color: white;
    }

    /* 🔹 MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    select, input {
      padding: 8px;
      margin: 5px;
      width: 200px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 18px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1e40af;
    }

    .task-item {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .summary-box {
      background: #eef2ff;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- 🔹 SIDEBAR -->
<div class="sidebar">
  <h2>Admin Panel</h2>
  <p>Dashboard</p>
  <p onclick="showEmployees()">Employees</p>
  <p>Reports</p>
</div>

<!-- 🔹 MAIN -->
<div class="main">
<div class="card" id="employeeSection" style="display:none;">
  <h3>Employees</h3>
  <div id="employeeList"></div>
</div>

  <div class="header">
    <h2>Admin Dashboard</h2>
  </div>

  <!-- 🔹 SELECT USER -->
  <div class="card">
    <h3>Select Employee</h3>

    <select id="user" onchange="loadAssigned()">
      <option value="emp1">emp1</option>
      <option value="emp2">emp2</option>
    </select>
  </div>

  <!-- 🔹 ASSIGN -->
  <div class="card">
    <h3>Assign Task</h3>

    <input id="task" placeholder="Task name">
    <button onclick="assign()">Assign</button>
  </div>

  <!-- 🔹 REMOVE -->
  <div class="card">
    <h3>Remove Task</h3>

    <input id="task2" placeholder="Task name">
    <button onclick="removeTask()">Remove</button>
  </div>

  <!-- 🔹 ASSIGNED TASKS -->
  <div class="card">
    <h3>Assigned Tasks</h3>
    <div id="assigned"></div>
  </div>

  <!-- 🔹 SUMMARY -->
  <div class="card">
    <h3>Task-wise Summary</h3>
    <div id="taskSummary"></div>
  </div>

</div>

<script>

// 🔹 LOAD ASSIGNED TASKS + SUMMARY
async function loadAssigned() {
  const user = document.getElementById("user").value;

  try {
    const res = await fetch(`/tasks/${user}`);
    const data = await res.json();

    const container = document.getElementById("assigned");

    if (Array.isArray(data) && data.length > 0) {
      container.innerHTML = data.map(t =>
        `<div class="task-item">• ${t}</div>`
      ).join("");
    } else {
      container.innerHTML = "<p>No tasks assigned</p>";
    }

    loadTaskSummary();

  } catch (err) {
    console.error(err);
    document.getElementById("assigned").innerHTML = "Error loading tasks";
  }
}

// 🔹 LOAD TASK SUMMARY
async function loadTaskSummary() {
  const user = document.getElementById("user").value;

  try {
    const res = await fetch(`/task-summary/${user}`);
    const data = await res.json();

    const container = document.getElementById("taskSummary");

    if (!data || Object.keys(data).length === 0) {
      container.innerHTML = "<p>No data</p>";
      return;
    }

    let html = "";

    for (let task in data) {
      html += `
        <div class="summary-box">
          <b>${task}</b><br>
          ${data[task].hrs} hrs ${data[task].mins} mins
        </div>
      `;
    }

    container.innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById("taskSummary").innerHTML = "Error loading summary";
  }
}

// 🔹 ASSIGN TASK
async function assign() {
  const user = document.getElementById("user").value;
  const task = document.getElementById("task").value;

  if (!task) return alert("Enter task");

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "assign",
      user,
      task
    })
  });

  alert("Task Assigned");
  document.getElementById("task").value = "";
  loadAssigned();
}

// 🔹 REMOVE TASK
async function removeTask() {
  const user = document.getElementById("user").value;
  const task = document.getElementById("task2").value;

  if (!task) return alert("Enter task");

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "remove",
      user,
      task
    })
  });

  alert("Task Removed");
  document.getElementById("task2").value = "";
  loadAssigned();
}

// INITIAL LOAD
window.onload = () => {
  loadAssigned();
};

</script>

</body>
</html>
