<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input, select {
      padding: 8px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 8px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    h2 {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<h2>Admin Dashboard</h2>

<div class="card">
  <h3>Assign Task</h3>

  <select id="user">
    <option value="emp1">emp1</option>
    <option value="emp2">emp2</option>
  </select>

  <input id="task" placeholder="Task name">
  <button onclick="assign()">Assign</button>
</div>

<div class="card">
  <h3>Remove Task</h3>

  <select id="user2">
    <option value="emp1">emp1</option>
    <option value="emp2">emp2</option>
  </select>

  <input id="task2" placeholder="Task name">
  <button onclick="removeTask()">Remove</button>
</div>

<div class="card">
  <h3>Assigned Tasks</h3>
  <div id="assigned"></div>
</div>

<script>

async function loadAssigned() {
  const user = document.getElementById("user").value;

  const res = await fetch(`/tasks/${user}`);
  const data = await res.json();

  const container = document.getElementById("assigned");

  if (Array.isArray(data) && data.length > 0) {
    container.innerHTML = data.map(t => `<p>• ${t}</p>`).join("");
  } else {
    container.innerHTML = "<p>No tasks</p>";
  }
}

async function assign() {
  const user = document.getElementById("user").value;
  const task = document.getElementById("task").value;

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "assign",
      user,
      task
    })
  });

  alert("Task Assigned");
  loadAssigned();
}

async function removeTask() {
  const user = document.getElementById("user2").value;
  const task = document.getElementById("task2").value;

  await fetch('/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: "remove",
      user,
      task
    })
  });

  alert("Task Removed");
  loadAssigned();
}

loadAssigned();

</script>

</body>
</html>
