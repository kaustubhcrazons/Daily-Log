<!DOCTYPE html>
<html>
<head>
  <title>Employee Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#eef2ff;
      min-height:100vh;
      padding:35px;
      color:#111827;
    }

    .profile-card{
      max-width:1100px;
      margin:auto;
      background:white;
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 15px 40px rgba(0,0,0,0.08);
    }

    .banner{
      height:240px;
      background:
      linear-gradient(
        135deg,
        #2563eb,
        #4f46e5,
        #7c3aed
      );
      position:relative;
    }

    .banner::after{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      right:-60px;
      top:-60px;
    }

    .content{
      padding:35px;
      margin-top:-90px;
      position:relative;
      z-index:2;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:20px;
      flex-wrap:wrap;
    }

    .profile-left{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .avatar{
      width:140px;
      height:140px;
      border-radius:50%;
      border:6px solid white;
      overflow:hidden;
      background:white;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .top h1{
      font-size:42px;
      font-weight:800;
      margin-bottom:10px;
    }

    .badge{
      display:inline-block;
      padding:8px 16px;
      background:#dcfce7;
      color:#166534;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
      margin-top:10px;
    }

    .edit-btn{
      border:none;
      background:
      linear-gradient(
        135deg,
        #2563eb,
        #4f46e5
      );
      color:white;
      padding:14px 24px;
      border-radius:16px;
      cursor:pointer;
      font-weight:600;
      font-size:15px;
      transition:0.3s;
    }

    .edit-btn:hover{
      transform:translateY(-2px);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:40px;
    }

    .stat-card{
      background:
      linear-gradient(
        135deg,
        #2563eb,
        #4f46e5
      );

      color:white;
      padding:26px;
      border-radius:24px;
      box-shadow:0 10px 25px rgba(79,70,229,0.25);
    }

    .stat-card p{
      opacity:0.9;
      font-size:15px;
    }

    .stat-card h2{
      font-size:42px;
      margin-top:14px;
      font-weight:800;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
      margin-top:35px;
    }

    .section{
      background:#f8fafc;
      border-radius:24px;
      padding:26px;
      border:1px solid #e5e7eb;
    }

    .section h3{
      font-size:24px;
      margin-bottom:20px;
    }

    .skills{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:18px;
    }

    .skill{
      background:#eef2ff;
      color:#4338ca;
      padding:10px 16px;
      border-radius:999px;
      font-size:14px;
      font-weight:600;
    }

    .activity{
      background:white;
      border-radius:18px;
      padding:18px;
      margin-bottom:14px;
      border:1px solid #e5e7eb;
      transition:0.3s;
    }

    .activity:hover{
      transform:translateY(-2px);
    }

    .activity-title{
      font-weight:600;
      margin-bottom:6px;
    }

    .activity-time{
      color:#64748b;
      font-size:13px;
    }

    .progress-box{
      margin-top:25px;
    }

    .progress-top{
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .progress-bar{
      height:12px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-fill{
      width:78%;
      height:100%;
      background:
      linear-gradient(
        135deg,
        #2563eb,
        #4f46e5
      );
      border-radius:999px;
    }

    #designation{
      border:none;
      background:transparent;
      font-size:18px;
      color:#64748b;
      outline:none;
      width:320px;
      margin-bottom:8px;
    }

    #skillsInput{
      width:100%;
      margin-top:15px;
      height:90px;
      border:1px solid #dbe3f0;
      border-radius:16px;
      padding:14px;
      resize:none;
      outline:none;
      font-family:Inter;
    }

    @media(max-width:900px){

      .grid{
        grid-template-columns:1fr;
      }

      .top{
        align-items:flex-start;
      }

    }

    @media(max-width:768px){

      body{
        padding:15px;
      }

      .content{
        padding:22px;
      }

      .top h1{
        font-size:30px;
      }

      .avatar{
        width:110px;
        height:110px;
      }

      .banner{
        height:180px;
      }

      .stats{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

<div class="profile-card">

  <div class="banner"></div>

  <div class="content">

    <div class="top">

      <div class="profile-left">

        <div class="avatar">

          <img
            id="profileImg"
            src="https://ui-avatars.com/api/?name=Kunal&background=4f46e5&color=fff&size=256"
          >

        </div>

        <div>

          <h1 id="empName">Kunal</h1>

          <input
            type="text"
            id="designation"
            value="UI/UX Designer"
          >

          <div class="badge">
            Active Employee
          </div>

        </div>

      </div>

      <button onclick="saveProfile()" class="edit-btn">
        Save Profile
      </button>

    </div>

    <!-- ================= STATS ================= -->

    <div class="stats">

      <div class="stat-card">
        <p>Total Hours This Month</p>
        <h2 id="totalHours">0</h2>
      </div>

      <div class="stat-card">
        <p>Completed Tasks</p>
        <h2 id="completedTasks">0</h2>
      </div>

      <div class="stat-card">
        <p>Active Projects</p>
        <h2 id="activeProjects">0</h2>
      </div>

    </div>

    <!-- ================= GRID ================= -->

    <div class="grid">

      <!-- ================= SKILLS ================= -->

      <div class="section">

        <h3>Skills</h3>

        <div class="skills" id="skillsContainer"></div>

        <textarea
          id="skillsInput"
          placeholder="Add skills separated by commas"
        ></textarea>

        <div class="progress-box">

          <div class="progress-top">
            <span>Monthly Productivity</span>
            <span>78%</span>
          </div>

          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>

        </div>

      </div>

      <!-- ================= ACTIVITY ================= -->

      <div class="section" id="activitySection">

        <h3>Recent Activity</h3>

      </div>

    </div>

  </div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

async function loadProfile(){

  // ================= PROFILE =================

  const profileRes = await fetch(
    `/profile/${user.id}`
  );

  const profile = await profileRes.json();

  // NAME
  document.getElementById("empName").innerText =
    profile.name || user.id;

  // DESIGNATION
  document.getElementById("designation").value =
    profile.designation || "";

  // AVATAR
  document.getElementById("profileImg").src =
    `https://ui-avatars.com/api/?name=${profile.name || user.id}&background=4f46e5&color=fff`;

  // ================= SKILLS =================

  const skillsContainer =
    document.getElementById("skillsContainer");

  skillsContainer.innerHTML = "";

  document.getElementById("skillsInput").value =
    profile.skills || "";

  if(profile.skills){

    const skills = profile.skills.split(",");

    skills.forEach(skill => {

      skillsContainer.innerHTML += `
        <div class="skill">
          ${skill.trim()}
        </div>
      `;

    });

  }

  // ================= STATS =================

  const statsRes = await fetch(
    `/profile-stats/${user.id}`
  );

  const stats = await statsRes.json();

  document.getElementById("totalHours").innerText =
    stats.totalHours || 0;

  document.getElementById("completedTasks").innerText =
    stats.completedTasks || 0;

  document.getElementById("activeProjects").innerText =
    stats.activeProjects || 0;

  // ================= ACTIVITIES =================

  const activityRes = await fetch(
    `/recent-activities/${user.id}`
  );

  const activities = await activityRes.json();

  const activitySection =
    document.getElementById("activitySection");

  let html = `
    <h3>Recent Activity</h3>
  `;

  if(activities.length === 0){

    html += `
      <p>No recent activity</p>
    `;
  }

  activities.forEach(a => {

    html += `

      <div class="activity">

        <div class="activity-title">
          ${a.title}
        </div>

        <div class="activity-time">
          ${a.time}
        </div>

      </div>

    `;
  });

  activitySection.innerHTML = html;

}

// ================= SAVE PROFILE =================

async function saveProfile(){

  const designation =
    document.getElementById("designation").value;

  const skills =
    document.getElementById("skillsInput").value;

  const res = await fetch('/submit', {

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body:JSON.stringify({

      action:'updateProfile',

      user:user.id,

      designation,

      skills

    })

  });

  const data = await res.json();

  if(data.success){

    alert("Profile Updated Successfully");

    loadProfile();

  }else{

    alert("Update Failed");

  }

}

loadProfile();

</script>

</body>
</html>
