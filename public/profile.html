<!DOCTYPE html>
<html>
<head>
  <title>Employee Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#f3f6fb;
      padding:30px;
      color:#111827;
    }

    .profile-card{
      max-width:900px;
      margin:auto;
      background:white;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .banner{
      height:180px;
      background:linear-gradient(135deg,#2563eb,#4f46e5);
    }

    .content{
      padding:30px;
      margin-top:-60px;
    }

    .avatar{
      width:120px;
      height:120px;
      border-radius:50%;
      border:5px solid white;
      background:#e5e7eb;
      overflow:hidden;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .top{
      display:flex;
      align-items:center;
      gap:25px;
      flex-wrap:wrap;
    }

    .top h1{
      font-size:34px;
      margin-bottom:8px;
    }

    .role{
      color:#64748b;
      font-size:15px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:35px;
    }

    .stat-card{
      background:#f8fafc;
      padding:22px;
      border-radius:18px;
      border:1px solid #e5e7eb;
    }

    .stat-card h2{
      font-size:34px;
      margin-top:10px;
      color:#2563eb;
    }

    .section{
      margin-top:35px;
    }

    .section h3{
      margin-bottom:15px;
      font-size:24px;
    }

    .skills{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .skill{
      background:#eef2ff;
      color:#4f46e5;
      padding:10px 16px;
      border-radius:999px;
      font-size:14px;
      font-weight:500;
    }

    .activity{
      background:#f8fafc;
      padding:18px;
      border-radius:14px;
      margin-bottom:12px;
    }

    @media(max-width:768px){

      body{
        padding:15px;
      }

      .top h1{
        font-size:26px;
      }

      .content{
        padding:20px;
      }

      .avatar{
        width:100px;
        height:100px;
      }
    }

  </style>
</head>
<body>

<div class="profile-card">

  <div class="banner"></div>

  <div class="content">

    <div class="top">

      <div class="avatar">
        <img src="https://ui-avatars.com/api/?name=Kunal&background=4f46e5&color=fff&size=256">
      </div>

      <div>
        <h1 id="empName">Kunal</h1>
        <div class="role">UI/UX Designer</div>
      </div>

    </div>

    <div class="stats">

      <div class="stat-card">
        <p>Total Hours</p>
        <h2>124</h2>
      </div>

      <div class="stat-card">
        <p>Completed Tasks</p>
        <h2>36</h2>
      </div>

      <div class="stat-card">
        <p>Active Projects</p>
        <h2>5</h2>
      </div>

    </div>

    <div class="section">

      <h3>Skills</h3>

      <div class="skills">
        <div class="skill">UI Design</div>
        <div class="skill">Figma</div>
        <div class="skill">Wireframing</div>
        <div class="skill">Graphic Design</div>
      </div>

    </div>

    <div class="section">

      <h3>Recent Activity</h3>

      <div class="activity">
        Worked 3 hrs on Trident Website UI
      </div>

      <div class="activity">
        Completed Confetti homepage edits
      </div>

      <div class="activity">
        Submitted daily report
      </div>

    </div>

  </div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(user){
  document.getElementById("empName").innerText = user.id;
}

</script>

</body>
</html>
